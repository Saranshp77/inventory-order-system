name: Build and Push Backend Image

# When this runs:
#   - on every push to the main branch
#   - manually, via the "Run workflow" button in the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the repository code onto the runner.
      - name: Check out the code
        uses: actions/checkout@v4

      # 2. Set up Buildx, Docker's advanced image builder.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to Docker Hub using repository secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Work out the short (7-character) commit SHA for tagging.
      - name: Compute short commit SHA
        id: vars
        run: echo "sha_short=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # 5. Build the backend image and push it with two tags:
      #    - latest          (always the newest build)
      #    - <short commit>  (the first 7 chars of the commit SHA)
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-backend:${{ steps.vars.outputs.sha_short }}
